# CI for pi-web.
#
# Runs on every push to main and every pull request targeting main.
#
# Three jobs, split by flakiness profile:
#   verify      - offline gate (type-check + unit tests + smoke). MUST pass.
#   e2e-fetch   - live fetch+extract on example.com (stable). MUST pass, with
#                 retries to absorb transient network blips.
#   e2e-search  - live DuckDuckGo search parse. INFORMATIONAL only:
#                 DDG rate-limits CI runner IPs, so it runs with
#                 continue-on-error so its flakiness never blocks a merge
#                 while still surfacing an availability signal.
#
# All jobs run inside an ephemeral container (node:22-bookworm-slim) to keep
# the runner host pure and the environment reproducible (no host toolchain
# pollution, identical image across runs). Node 22 matches engines.node.
#
# Required status checks (branch protection) should include: `verify` and
# `e2e-fetch`. `e2e-search` must NOT be a required check.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Type-check, unit tests, smoke (offline)
    runs-on: ubuntu-latest
    container: node:22-bookworm-slim
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (reproducible)
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npm run check

      - name: Unit tests (offline)
        run: npm test

      - name: Build bundle (esbuild → dist/index.mjs)
        run: npm run build

      - name: Smoke test (extension loads, registers both tools via jiti)
        run: npm run smoke

      - name: Verify bundle loads (no jiti, registers both tools)
        run: node -e "const t=[];(await import('./dist/index.mjs')).default({registerTool:d=>t.push(d)});const n=t.map(t=>t.name).sort();if(n.join(',')!=='web_fetch,web_search')throw new Error('unexpected tools: '+n);console.log('bundle loads OK, tools:',n.join(','))"

  e2e-fetch:
    name: Live fetch + extract (example.com)
    runs-on: ubuntu-latest
    container: node:22-bookworm-slim
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (reproducible)
        run: npm ci

      # example.com is IANA-maintained and highly stable; transient failures
      # are network blips, not regressions. Retry up to 3 times so a single
      # blip does not fail the gate. A real regression (e.g. broken
      # extractContent on live HTML) fails on every attempt, so retries do not
      # mask genuine breakage.
      - name: Live fetch + extract on example.com
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 2
          max_attempts: 3
          command: npm run e2e:fetch

  e2e-search:
    name: Live DuckDuckGo search (informational)
    runs-on: ubuntu-latest
    container: node:22-bookworm-slim
    timeout-minutes: 5
    # DDG frequently rate-limits/challenges CI runner IPs. This job surfaces
    # a (weak) availability signal but must never block a merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (reproducible)
        run: npm ci

      - name: Live DuckDuckGo search parse
        run: npm run e2e:search
